name: Auto-maintain release PR

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-release-pr
  cancel-in-progress: false

jobs:
  upsert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Upsert release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/autoReleasePrRun.mjs
