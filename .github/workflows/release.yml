name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Pin the published version to the tag, so it matches regardless of what
      # package.json on the tagged commit happens to say.
      - run: npm pkg set version="${GITHUB_REF_NAME#v}"
      # prepublishOnly runs typecheck + coverage + build before publishing
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
