name: Tag release and open sync PR

# Fires when the stagingâ†’main release PR merges. We trigger on the
# pull_request `closed` event (not push), because the push event's
# head_commit.message is just "Merge pull request #N from owner/staging" â€”
# GitHub does not append the PR title to the merge commit body, so the old
# `contains(..., 'Release: staging to main')` guard silently skipped the
# release. The pull_request payload carries the head ref + merged flag
# directly, which is reliable.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  actions: write # dispatch release.yml (workflow_dispatch) to publish the tag

concurrency:
  group: release-changelog
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Manual dispatch always runs; the PR path runs only for a merged stagingâ†’main PR.
    if: "${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'staging') }}"
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from main's tip (the merge commit), not the PR head â€” the
          # script's ancestry guard requires HEAD to be a 2-parent merge commit.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Configure git as github-actions[bot]
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Tag release + open sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/releaseChangelogRun.mjs
