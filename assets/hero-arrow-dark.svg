<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220" role="img" aria-label="A hand-drawn arrow drawing itself">
  <style>
    .ink { fill: none; stroke: #e7e9ee; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .shaft { stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: draw-shaft 4s ease-in-out infinite; }
    .head  { stroke-dasharray: 90;  stroke-dashoffset: 90;  animation: draw-head 4s ease-in-out infinite; }
    @keyframes draw-shaft {
      0%   { stroke-dashoffset: 1400; }
      45%  { stroke-dashoffset: 0; }
      92%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 1400; }
    }
    @keyframes draw-head {
      0%   { stroke-dashoffset: 90; }
      45%  { stroke-dashoffset: 90; }
      62%  { stroke-dashoffset: 0; }
      92%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 90; }
    }
    @media (prefers-reduced-motion: reduce) {
      .shaft, .head { animation: none; stroke-dashoffset: 0; }
    }
  </style>
