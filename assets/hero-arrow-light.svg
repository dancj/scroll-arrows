<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220" role="img" aria-label="A hand-drawn arrow drawing itself between two elements">
  <style>
    .ink   { fill: none; stroke: #1b1f24; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .box   { fill: none; stroke: #1b1f24; stroke-width: 2; }
    .label { fill: #1b1f24; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 16px; }
    .shaft { stroke-dasharray: 760; stroke-dashoffset: 760; animation: draw-shaft 4s ease-in-out infinite; }
    .head  { stroke-dasharray: 60;  stroke-dashoffset: 60;  animation: draw-head 4s ease-in-out infinite; }
    @keyframes draw-shaft {
      0%   { stroke-dashoffset: 760; }
      45%  { stroke-dashoffset: 0; }
      92%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 760; }
    }
    @keyframes draw-head {
      0%   { stroke-dashoffset: 60; }
      45%  { stroke-dashoffset: 60; }
      62%  { stroke-dashoffset: 0; }
      92%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 60; }
    }
    @media (prefers-reduced-motion: reduce) {
      .shaft, .head { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <!-- start element -->
  <rect class="box" x="40" y="82" width="118" height="56" rx="10" />
  <text class="label" x="99" y="116" text-anchor="middle">#box-a</text>

  <!-- end element -->
  <rect class="box" x="482" y="82" width="118" height="56" rx="10" />
  <text class="label" x="541" y="116" text-anchor="middle">#box-b</text>

  <!-- arrow drawing itself between them -->
  <path class="ink shaft" d="M164 110 C 230 90, 298 152, 358 132 C 408 116, 446 108, 474 112 M165 113 C 231 93, 299 155, 359 135 C 409 119, 447 111, 475 115" />
  <path class="ink head" d="M476 112 C 468 109, 461 106, 452 100 M476.5 113 C 468 110, 460 107, 451 101" />
  <path class="ink head" d="M476 114 C 468 117, 461 121, 453 128 M476.5 114.5 C 468 118, 460 122, 452 129" />
</svg>
