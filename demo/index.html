<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>scroll-arrows demo</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #111317;
        color: #e7e9ee;
      }
      .intro, .spacer { padding: 4rem 2rem; text-align: center; }
      .spacer { height: 40vh; color: #555; }
      .step { margin: 60vh auto; max-width: 960px; padding: 0 2rem; }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6rem;
        padding: 0 1rem;
      }
      .box {
        width: 150px;
        padding: 1.3rem;
        border-radius: 14px;
        background: #1d6b6b;
        text-align: center;
        font-weight: 600;
      }
      .box.brown { background: #6b4a1d; }
      .code {
        margin: 1.6rem auto 0;
        max-width: 420px;
        background: #0a0b0d;
        border: 1px solid #262a31;
        border-radius: 10px;
        padding: 1rem 1.2rem;
        font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre;
        overflow-x: auto;
        color: #c9d1d9;
      }
      .code .k { color: #79c0ff; }
      .code .s { color: #a5d6ff; }
      .code .n { color: #ffa657; }
      .code .fn { color: #d2a8ff; }
      code { background: #000; padding: 0 .3rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="intro">
      <h1>scroll-arrows</h1>
      <p>Scroll down — each step draws its arrow and shows the exact API call.</p>
      <p>The <code>roughness</code> knob climbs from clean to scratchy.</p>
    </div>

    <div id="steps"></div>

    <div class="spacer">— fin —</div>

    <script type="module">
      import { scrollArrow } from "../src/index.ts";

      const PAGE_BG = "#111317";

      // Single source of truth: each step's options drive both the arrow and
      // the code card rendered beside it.
      const steps = [
        // on the line (gap mask)
        { id: "1", a: "enriched[]", roughness: 0.0, label: "enriched[]" },
        // nudged above the line
        { id: "2", a: "crm[]", roughness: 0.35, label: "crm[]", labelOffset: -22 },
        // near the start of the path
        { id: "3", a: "gpt[]", roughness: 0.7, label: "gpt[]", labelAt: 0.25 },
        // nudged below the line
        { id: "4", a: "onboard[]", roughness: 1.0, label: "onboard[]", labelOffset: 22 },
      ];

      const host = document.getElementById("steps");

      for (const step of steps) {
        const aId = `a${step.id}`;
        const bId = `b${step.id}`;

        const opts = {
          start: `#${bId}`,
          end: `#${aId}`,
          roughness: step.roughness,
          label: step.label,
          ...(step.labelAt !== undefined ? { labelAt: step.labelAt } : {}),
          ...(step.labelOffset !== undefined
            ? { labelOffset: step.labelOffset }
            : {}),
          stroke: "#e7e9ee",
          strokeWidth: 2.5,
          labelBackground: PAGE_BG,
        };

        const el = document.createElement("div");
        el.className = "step";
        el.innerHTML = `
          <div class="row">
            <div class="box" id="${aId}">${step.a}</div>
            <div class="box brown" id="${bId}">step ${step.id}</div>
          </div>
          <div class="code">${renderCall(opts)}</div>
        `;
        host.appendChild(el);

        scrollArrow(opts);
      }

      // Pretty-print an options object as a highlighted scrollArrow({...}) call.
      function renderCall(opts) {
        const esc = (s) =>
          String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
        const lines = Object.entries(opts).map(([k, v]) => {
          let val;
          if (typeof v === "string") val = `<span class="s">"${esc(v)}"</span>`;
          else if (typeof v === "number") val = `<span class="n">${v}</span>`;
          else val = esc(JSON.stringify(v));
          return `  <span class="k">${k}</span>: ${val},`;
        });
        return (
          `<span class="fn">scrollArrow</span>({\n` +
          lines.join("\n") +
          `\n})`
        );
      }
    </script>
  </body>
</html>
